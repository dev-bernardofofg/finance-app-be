name: Deploy

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: ESLint
        run: pnpm run eslint:check

      - name: Prettier
        run: pnpm run prettier:check

      - name: Test
        run: pnpm run test
